  <!-- privacy/removed note -->
  <rect class="box-removed" x="420" y="1105" width="770" height="88" rx="12"/>
  <text class="section" x="445" y="1138">本版明确不建表</text>
  <text class="note" x="445" y="1168">accounts 多账户、transactions.transfer 转账、transaction_splits 多人分账/拆分、event_participants 日程参与人。</text>
  <text class="note" x="445" y="1188">云端 Agent 不直连数据库；后端/端侧检索并打包最小必要上下文。</text>
