<svg xmlns="http://www.w3.org/2000/svg" width="1700" height="1120" viewBox="0 0 1700 1120">
  <defs>
    <style>
      .title { font: 700 34px 'Microsoft YaHei', Arial, sans-serif; fill: #16324f; }
      .subtitle { font: 400 18px 'Microsoft YaHei', Arial, sans-serif; fill: #516577; }
      .group-label { font: 700 18px 'Microsoft YaHei', Arial, sans-serif; fill: #16324f; }
      .box-title { font: 700 18px 'Consolas', 'Courier New', monospace; fill: #17324d; }
      .box-text { font: 14px 'Consolas', 'Courier New', monospace; fill: #28445c; }
      .note { font: 14px 'Microsoft YaHei', Arial, sans-serif; fill: #4a6174; }
      .arrow { stroke: #6b879e; stroke-width: 2.2; fill: none; marker-end: url(#arrowhead); }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6b879e" />
    </marker>
  </defs>

  <rect width="1700" height="1120" fill="#f6f8fb" />
  <text x="36" y="50" class="title">我在 · PostgreSQL 数据库架构图（最终版）</text>
  <text x="36" y="82" class="subtitle">个人日程 + 个人记账 + AI 输入解析 + 情境检索 + 习惯画像 + 手机号登录</text>

  <rect x="36" y="118" width="320" height="160" rx="18" fill="#ffffff" stroke="#cfd9e4" stroke-width="2"/>
  <text x="58" y="152" class="group-label">本版边界</text>
  <text x="58" y="188" class="note">做：手机号登录、日程、记账、AI 审计、习惯建议</text>
  <text x="58" y="218" class="note">不做：多账户钱包、转账、多人分账、日程参与者</text>
  <text x="58" y="248" class="note">说明：spending_summaries 为统计缓存，云端 Agent 不直连数据库</text>

  <text x="390" y="128" class="group-label">用户与认证</text>
  <rect x="390" y="148" width="250" height="168" rx="16" fill="#e9f6ff" stroke="#63b3ed" stroke-width="2"/>
  <text x="410" y="178" class="box-title">users</text>
  <text x="410" y="208" class="box-text">PK id UUID</text>
  <text x="410" y="230" class="box-text">username VARCHAR(50)</text>
  <text x="410" y="252" class="box-text">phone VARCHAR(20) UNIQUE</text>
  <text x="410" y="274" class="box-text">email CITEXT NULL</text>
  <text x="410" y="296" class="box-text">last_login_at / created_at / updated_at</text>

  <rect x="675" y="120" width="280" height="160" rx="16" fill="#e9f6ff" stroke="#63b3ed" stroke-width="2"/>
  <text x="695" y="150" class="box-title">auth_verification_codes</text>
  <text x="695" y="180" class="box-text">PK id UUID</text>
  <text x="695" y="202" class="box-text">FK user_id UUID NULL</text>
  <text x="695" y="224" class="box-text">phone / purpose / channel</text>
  <text x="695" y="246" class="box-text">code_hash / expires_at / consumed_at</text>
  <text x="695" y="268" class="box-text">attempt_count / status / created_at</text>

  <rect x="985" y="120" width="280" height="160" rx="16" fill="#e9f6ff" stroke="#63b3ed" stroke-width="2"/>
  <text x="1005" y="150" class="box-title">user_sessions</text>
  <text x="1005" y="180" class="box-text">PK id UUID</text>
  <text x="1005" y="202" class="box-text">FK user_id UUID</text>
  <text x="1005" y="224" class="box-text">session_token_hash</text>
  <text x="1005" y="246" class="box-text">device_id / client_platform / app_version</text>
  <text x="1005" y="268" class="box-text">expires_at / revoked_at / last_seen_at</text>

  <rect x="1295" y="120" width="330" height="190" rx="16" fill="#e9f6ff" stroke="#63b3ed" stroke-width="2"/>
  <text x="1315" y="150" class="box-title">user_preferences / user_financial_profiles</text>
  <text x="1315" y="182" class="box-text">PK/FK user_id UUID</text>
  <text x="1315" y="204" class="box-text">currency / timezone / default_view</text>
  <text x="1315" y="226" class="box-text">reminder_setting JSONB</text>
  <text x="1315" y="248" class="box-text">initial_balance / current_balance</text>
  <text x="1315" y="270" class="box-text">通知设置独立在 notification_settings</text>

  <text x="380" y="370" class="group-label">日程域</text>
  <rect x="380" y="392" width="320" height="240" rx="16" fill="#e7f0fb" stroke="#6996c8" stroke-width="2"/>
  <text x="402" y="424" class="box-title">events</text>
  <text x="402" y="454" class="box-text">PK id UUID / FK user_id UUID</text>
  <text x="402" y="476" class="box-text">title / description / location / color</text>
  <text x="402" y="498" class="box-text">all_day BOOLEAN</text>
  <text x="402" y="520" class="box-text">start_date / end_date</text>
  <text x="402" y="542" class="box-text">start_at / end_at / timezone</text>
  <text x="402" y="564" class="box-text">event_type schedule/todo</text>
  <text x="402" y="586" class="box-text">priority / status / recurrence_rule</text>
  <text x="402" y="608" class="box-text">source_input_id / deleted_at</text>

  <rect x="735" y="392" width="250" height="168" rx="16" fill="#e7f0fb" stroke="#6996c8" stroke-width="2"/>
  <text x="755" y="424" class="box-title">event_reminders</text>
  <text x="755" y="454" class="box-text">PK id / FK user_id / FK event_id</text>
  <text x="755" y="476" class="box-text">remind_at TIMESTAMPTZ</text>
  <text x="755" y="498" class="box-text">method push/email/sms/voice</text>
  <text x="755" y="520" class="box-text">is_sent / created_at</text>

  <rect x="1020" y="392" width="250" height="150" rx="16" fill="#fff8de" stroke="#d7a11f" stroke-width="2"/>
  <text x="1040" y="424" class="box-title">tags</text>
  <text x="1040" y="454" class="box-text">PK id / FK user_id</text>
  <text x="1040" y="476" class="box-text">name / color</text>
  <text x="1040" y="498" class="box-text">updated_at / deleted_at</text>

  <rect x="1305" y="392" width="300" height="150" rx="16" fill="#fff8de" stroke="#d7a11f" stroke-width="2"/>
  <text x="1325" y="424" class="box-title">event_tags</text>
  <text x="1325" y="454" class="box-text">FK user_id</text>
  <text x="1325" y="476" class="box-text">PK/FK event_id</text>
  <text x="1325" y="498" class="box-text">PK/FK tag_id / created_at</text>

  <text x="378" y="690" class="group-label">记账域</text>
  <rect x="378" y="712" width="260" height="188" rx="16" fill="#ffe8e8" stroke="#ef6f6f" stroke-width="2"/>
  <text x="400" y="744" class="box-title">categories</text>
  <text x="400" y="774" class="box-text">PK id / FK user_id / parent_id</text>
  <text x="400" y="796" class="box-text">name / type income-expense-both</text>
  <text x="400" y="818" class="box-text">icon / color</text>
  <text x="400" y="840" class="box-text">updated_at / deleted_at</text>
  <text x="400" y="862" class="box-text">唯一性按 user_id + name + type + 未删除</text>

  <rect x="670" y="682" width="360" height="250" rx="16" fill="#ffe8e8" stroke="#ef6f6f" stroke-width="2"/>
  <text x="692" y="714" class="box-title">transactions</text>
  <text x="692" y="744" class="box-text">PK id / FK user_id</text>
  <text x="692" y="766" class="box-text">event_id NULL / category_id NULL</text>
  <text x="692" y="788" class="box-text">type income/expense</text>
  <text x="692" y="810" class="box-text">amount &gt; 0 / currency</text>
  <text x="692" y="832" class="box-text">description / payment_method / location</text>
  <text x="692" y="854" class="box-text">occurred_at / is_manual</text>
  <text x="692" y="876" class="box-text">source_input_id / deleted_at</text>
  <text x="692" y="898" class="box-text">记账与日程分离，只通过 event_id 可选关联</text>

  <rect x="1060" y="682" width="260" height="150" rx="16" fill="#fff8de" stroke="#d7a11f" stroke-width="2"/>
  <text x="1082" y="714" class="box-title">transaction_tags</text>
  <text x="1082" y="744" class="box-text">FK user_id</text>
  <text x="1082" y="766" class="box-text">PK/FK transaction_id</text>
  <text x="1082" y="788" class="box-text">PK/FK tag_id / created_at</text>

  <rect x="1350" y="662" width="290" height="220" rx="16" fill="#fff0d8" stroke="#d7a11f" stroke-width="2"/>
  <text x="1372" y="694" class="box-title">budgets / financial_goals / spending_summaries</text>
  <text x="1372" y="724" class="box-text">budgets: period / limit_amount / alert_threshold</text>
  <text x="1372" y="746" class="box-text">financial_goals: target_amount / current_amount</text>
  <text x="1372" y="768" class="box-text">spending_summaries: period_type / totals / balance</text>
  <text x="1372" y="790" class="box-text">category_breakdown JSONB</text>
  <text x="1372" y="812" class="box-text">其中 spending_summaries 为统计缓存</text>
  <text x="1372" y="834" class="box-text">current_balance 统一在 user_financial_profiles 维护</text>

  <text x="44" y="360" class="group-label">AI 与上下文</text>
  <rect x="44" y="392" width="280" height="160" rx="16" fill="#eaf0da" stroke="#6bb06b" stroke-width="2"/>
  <text x="66" y="424" class="box-title">ai_inputs</text>
  <text x="66" y="454" class="box-text">PK id / FK user_id</text>
  <text x="66" y="476" class="box-text">input_type text-voice-image</text>
  <text x="66" y="498" class="box-text">content / raw_text / image_url</text>
  <text x="66" y="520" class="box-text">recognized_json / created_at</text>

  <rect x="44" y="580" width="280" height="150" rx="16" fill="#eaf0da" stroke="#6bb06b" stroke-width="2"/>
  <text x="66" y="612" class="box-title">ai_extractions</text>
  <text x="66" y="642" class="box-text">PK id / FK input_id</text>
  <text x="66" y="664" class="box-text">entity_type event-transaction-task</text>
  <text x="66" y="686" class="box-text">parsed_data / confidence</text>

  <rect x="44" y="760" width="280" height="160" rx="16" fill="#eaf0da" stroke="#6bb06b" stroke-width="2"/>
  <text x="66" y="792" class="box-title">ai_insights</text>
  <text x="66" y="822" class="box-text">PK id / FK user_id</text>
  <text x="66" y="844" class="box-text">insight_type / title / content</text>
  <text x="66" y="866" class="box-text">related_data / is_read / deleted_at</text>

  <rect x="44" y="948" width="460" height="142" rx="16" fill="#eaf0da" stroke="#6bb06b" stroke-width="2"/>
  <text x="66" y="980" class="box-title">context_snapshots / user_habit_signals / ai_context_packages / ai_recommendation_feedback</text>
  <text x="66" y="1010" class="box-text">context_snapshots: weather_condition / time_bucket / location_scene / activity_scene / features</text>
  <text x="66" y="1032" class="box-text">user_habit_signals: signal_type / subject_value / context_filter / evidence_count / confidence</text>
  <text x="66" y="1054" class="box-text">ai_context_packages: package_type / context_keys / payload_summary / privacy_level</text>
  <text x="66" y="1076" class="box-text">ai_recommendation_feedback: feedback_type / feedback_text</text>

  <path class="arrow" d="M640 232 C655 232, 670 220, 675 210" />
  <path class="arrow" d="M640 242 C770 250, 920 250, 985 230" />
  <path class="arrow" d="M640 272 C840 310, 1190 280, 1295 220" />
  <path class="arrow" d="M540 316 C540 345, 540 360, 540 392" />
  <path class="arrow" d="M541 632 C620 700, 680 730, 730 748" />
  <path class="arrow" d="M184 552 C184 570, 184 580, 184 580" />
  <path class="arrow" d="M184 730 C184 742, 184 760, 184 760" />
  <path class="arrow" d="M284 470 C330 470, 350 470, 380 470" />
  <path class="arrow" d="M286 670 C410 706, 560 742, 670 782" />
  <path class="arrow" d="M700 470 C720 470, 735 470, 735 470" />
  <path class="arrow" d="M700 540 C840 590, 940 610, 1020 468" />
  <path class="arrow" d="M1120 542 C1210 548, 1270 520, 1305 488" />
  <path class="arrow" d="M640 808 C652 808, 670 808, 670 808" />
  <path class="arrow" d="M1030 808 C1040 808, 1060 808, 1060 808" />
  <path class="arrow" d="M1030 766 C1140 740, 1240 720, 1350 722" />
  <path class="arrow" d="M520 1020 C640 1020, 640 1020, 760 980" />
  <path class="arrow" d="M960 980 C1010 980, 1040 980, 1040 980" />
  <path class="arrow" d="M1320 980 C1370 980, 1400 980, 1400 980" />

  <text x="1100" y="1015" class="note">AI 只产出候选结果，最终仍由后端校验后写入 events / transactions</text>
</svg>
