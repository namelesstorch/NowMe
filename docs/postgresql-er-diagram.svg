    <text class="pk" x="1308" y="1157">PK</text><text class="field" x="1338" y="1157">id UUID</text>
    <text class="fk" x="1308" y="1180">FK</text><text class="field" x="1338" y="1180">user_id / insight_id / feedback_type</text>
  </g>

