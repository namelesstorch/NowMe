<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1240" viewBox="0 0 1920 1240">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#315f7d"/>
    </marker>
    <marker id="arrow-ai" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#2f7d5a"/>
    </marker>
    <style>
      .bg { fill: #f7fbff; }
      .title { font: 700 40px Arial, "PingFang SC", sans-serif; fill: #123047; }
      .subtitle { font: 500 21px Arial, "PingFang SC", sans-serif; fill: #425466; }
      .section { font: 700 20px Arial, "PingFang SC", sans-serif; fill: #2d3a45; }
      .note { font: 15px Arial, "PingFang SC", sans-serif; fill: #596b78; }
      .box-title { font: 700 17px Arial, "PingFang SC", sans-serif; fill: #172b3a; }
      .box-subtitle { font: 13px Arial, "PingFang SC", sans-serif; fill: #51606c; }
      .field { font: 12px Menlo, Consolas, monospace; fill: #263746; }
      .pk { fill: #d99200; font: 700 11px Arial, sans-serif; }
      .fk { fill: #7c4bb3; font: 700 11px Arial, sans-serif; }
      .line { stroke: #315f7d; stroke-width: 2; fill: none; marker-end: url(#arrow); }
      .line-soft { stroke: #94aec0; stroke-width: 1.6; fill: none; marker-end: url(#arrow); }
      .line-ai { stroke: #2f7d5a; stroke-width: 2; fill: none; stroke-dasharray: 7 5; marker-end: url(#arrow-ai); }
      .box-user { fill: #eaf5ff; stroke: #5a9ac9; stroke-width: 1.8; }
      .box-finance { fill: #fff1f4; stroke: #d66e88; stroke-width: 1.8; }
      .box-schedule { fill: #edf7ff; stroke: #4289bd; stroke-width: 1.8; }
      .box-tag { fill: #fff8df; stroke: #c49c24; stroke-width: 1.8; }
      .box-ai { fill: #eefaf2; stroke: #54a474; stroke-width: 1.8; }
      .box-cache { fill: #fff8e8; stroke: #c59b31; stroke-width: 1.8; }
      .box-removed { fill: #f4f6f8; stroke: #aab5bd; stroke-width: 1.5; stroke-dasharray: 8 5; }
      .header-user { fill: #cfe8fb; }
      .header-finance { fill: #ffdce5; }
      .header-schedule { fill: #d6ecfb; }
      .header-tag { fill: #ffefb8; }
      .header-ai { fill: #d5f1de; }
      .header-cache { fill: #ffe9aa; }
    </style>
  </defs>

  <rect class="bg" width="1920" height="1240"/>
  <text class="title" x="44" y="58">我在 · PostgreSQL 数据库架构图</text>
  <text class="subtitle" x="46" y="94">个人日程 + 个人记账 + AI 输入解析 + 情境习惯检索 + 统计缓存</text>

  <text class="section" x="44" y="145">AI 与情境上下文</text>
  <text class="section" x="420" y="145">用户与主数据</text>
  <text class="section" x="820" y="145">日程与记账主链路</text>
  <text class="section" x="1288" y="145">统计、预算与设置</text>

  <!-- AI column -->
  <g id="ai_inputs">
    <rect class="box-ai" x="44" y="175" width="310" height="160" rx="12"/>
    <path class="header-ai" d="M56 175h286a12 12 0 0 1 12 12v34H44v-34a12 12 0 0 1 12-12z"/>
    <text class="box-title" x="64" y="199">ai_inputs</text><text class="box-subtitle" x="190" y="199">AI 输入记录</text>
    <text class="pk" x="64" y="237">PK</text><text class="field" x="94" y="237">id UUID</text>
    <text class="fk" x="64" y="260">FK</text><text class="field" x="94" y="260">user_id UUID</text>
    <text class="field" x="64" y="283">input_type text/voice/image</text>
    <text class="field" x="64" y="306">content / raw_text / image_url</text>
    <text class="field" x="64" y="329">recognized_json JSONB</text>
  </g>

  <g id="ai_extractions">
    <rect class="box-ai" x="44" y="370" width="310" height="145" rx="12"/>
    <path class="header-ai" d="M56 370h286a12 12 0 0 1 12 12v34H44v-34a12 12 0 0 1 12-12z"/>
    <text class="box-title" x="64" y="394">ai_extractions</text><text class="box-subtitle" x="210" y="394">AI 解析结果</text>
    <text class="pk" x="64" y="432">PK</text><text class="field" x="94" y="432">id UUID</text>
    <text class="fk" x="64" y="455">FK</text><text class="field" x="94" y="455">input_id UUID</text>
    <text class="field" x="64" y="478">entity_type event/transaction/task</text>
    <text class="field" x="64" y="501">parsed_data JSONB / confidence</text>
  </g>

  <g id="context_snapshots">
    <rect class="box-ai" x="44" y="550" width="310" height="252" rx="12"/>
    <path class="header-ai" d="M56 550h286a12 12 0 0 1 12 12v34H44v-34a12 12 0 0 1 12-12z"/>
    <text class="box-title" x="64" y="574">context_snapshots</text><text class="box-subtitle" x="230" y="574">情境快照</text>
    <text class="pk" x="64" y="612">PK</text><text class="field" x="94" y="612">id UUID</text>
    <text class="fk" x="64" y="635">FK</text><text class="field" x="94" y="635">user_id UUID</text>
    <text class="field" x="64" y="658">source_type event/transaction/ai_input</text>
    <text class="field" x="64" y="681">event_id / transaction_id / input_id</text>
    <text class="field" x="64" y="704">occurred_at / date_local / timezone</text>
    <text class="field" x="64" y="727">day_of_week / is_weekend / time_bucket</text>
    <text class="field" x="64" y="750">weather_condition / temperature_bucket</text>
    <text class="field" x="64" y="773">location_scene / activity_scene / mood</text>
    <text class="field" x="64" y="796">features JSONB</text>
  </g>

  <g id="user_habit_signals">
    <rect class="box-ai" x="44" y="837" width="310" height="205" rx="12"/>
    <path class="header-ai" d="M56 837h286a12 12 0 0 1 12 12v34H44v-34a12 12 0 0 1 12-12z"/>
    <text class="box-title" x="64" y="861">user_habit_signals</text><text class="box-subtitle" x="235" y="861">习惯证据</text>
    <text class="pk" x="64" y="899">PK</text><text class="field" x="94" y="899">id UUID</text>
    <text class="fk" x="64" y="922">FK</text><text class="field" x="94" y="922">user_id UUID</text>
    <text class="field" x="64" y="945">signal_type / subject_type</text>
    <text class="field" x="64" y="968">subject_value VARCHAR(100)</text>
    <text class="field" x="64" y="991">context_filter JSONB</text>
    <text class="field" x="64" y="1014">evidence_count / confidence / status</text>
  </g>

  <g id="ai_context_packages">
    <rect class="box-ai" x="44" y="1074" width="310" height="130" rx="12"/>
    <path class="header-ai" d="M56 1074h286a12 12 0 0 1 12 12v34H44v-34a12 12 0 0 1 12-12z"/>
    <text class="box-title" x="64" y="1098">ai_context_packages</text><text class="box-subtitle" x="240" y="1098">云端上下文包</text>
    <text class="pk" x="64" y="1136">PK</text><text class="field" x="94" y="1136">id UUID</text>
    <text class="fk" x="64" y="1159">FK</text><text class="field" x="94" y="1159">user_id / input_id</text>
    <text class="field" x="64" y="1182">context_keys / payload_summary</text>
  </g>

  <!-- user column -->
  <g id="users">
    <rect class="box-user" x="420" y="175" width="320" height="160" rx="12"/>
    <path class="header-user" d="M432 175h296a12 12 0 0 1 12 12v34H420v-34a12 12 0 0 1 12-12z"/>
    <text class="box-title" x="440" y="199">users</text><text class="box-subtitle" x="560" y="199">用户</text>
    <text class="pk" x="440" y="237">PK</text><text class="field" x="470" y="237">id UUID</text>
    <text class="field" x="440" y="260">username VARCHAR(50)</text>
    <text class="field" x="440" y="283">phone / email UNIQUE</text>
    <text class="field" x="440" y="306">avatar_url / created_at / updated_at</text>
  </g>

  <g id="user_preferences">
    <rect class="box-user" x="420" y="370" width="320" height="145" rx="12"/>
    <path class="header-user" d="M432 370h296a12 12 0 0 1 12 12v34H420v-34a12 12 0 0 1 12-12z"/>
    <text class="box-title" x="440" y="394">user_preferences</text><text class="box-subtitle" x="600" y="394">用户偏好</text>
    <text class="pk" x="440" y="432">PK/FK</text><text class="field" x="490" y="432">user_id UUID</text>
    <text class="field" x="440" y="455">currency / timezone / default_view</text>
    <text class="field" x="440" y="478">reminder_setting JSONB</text>
  </g>

  <g id="user_financial_profiles">
    <rect class="box-user" x="420" y="550" width="320" height="145" rx="12"/>
    <path class="header-user" d="M432 550h296a12 12 0 0 1 12 12v34H420v-34a12 12 0 0 1 12-12z"/>
    <text class="box-title" x="440" y="574">user_financial_profiles</text><text class="box-subtitle" x="645" y="574">总金额</text>
    <text class="pk" x="440" y="612">PK/FK</text><text class="field" x="490" y="612">user_id UUID</text>
    <text class="field" x="440" y="635">currency VARCHAR(10)</text>
    <text class="field" x="440" y="658">initial_balance / current_balance</text>
    <text class="field" x="440" y="681">由交易流水统一维护</text>
  </g>

  <g id="categories">
    <rect class="box-finance" x="420" y="730" width="320" height="160" rx="12"/>
    <path class="header-finance" d="M432 730h296a12 12 0 0 1 12 12v34H420v-34a12 12 0 0 1 12-12z"/>
    <text class="box-title" x="440" y="754">categories</text><text class="box-subtitle" x="575" y="754">分类</text>
    <text class="pk" x="440" y="792">PK</text><text class="field" x="470" y="792">id UUID</text>
    <text class="fk" x="440" y="815">FK</text><text class="field" x="470" y="815">user_id / parent_id</text>
    <text class="field" x="440" y="838">name / type income/expense/both</text>
    <text class="field" x="440" y="861">icon / color</text>
  </g>

  <g id="tags">
    <rect class="box-tag" x="420" y="925" width="320" height="145" rx="12"/>
    <path class="header-tag" d="M432 925h296a12 12 0 0 1 12 12v34H420v-34a12 12 0 0 1 12-12z"/>
    <text class="box-title" x="440" y="949">tags</text><text class="box-subtitle" x="575" y="949">统一标签</text>
    <text class="pk" x="440" y="987">PK</text><text class="field" x="470" y="987">id UUID</text>
    <text class="fk" x="440" y="1010">FK</text><text class="field" x="470" y="1010">user_id UUID</text>
    <text class="field" x="440" y="1033">name / color / created_at</text>
  </g>

  <!-- core chain -->
  <g id="events">
    <rect class="box-schedule" x="820" y="175" width="370" height="255" rx="12"/>
    <path class="header-schedule" d="M832 175h346a12 12 0 0 1 12 12v34H820v-34a12 12 0 0 1 12-12z"/>
    <text class="box-title" x="840" y="199">events</text><text class="box-subtitle" x="965" y="199">日程 / 待办</text>
    <text class="pk" x="840" y="237">PK</text><text class="field" x="870" y="237">id UUID</text>
    <text class="fk" x="840" y="260">FK</text><text class="field" x="870" y="260">user_id UUID</text>
    <text class="field" x="840" y="283">title / description / location / color</text>
    <text class="field" x="840" y="306">all_day BOOLEAN</text>
    <text class="field" x="840" y="329">start_date/end_date for all-day</text>
    <text class="field" x="840" y="352">start_at/end_at for timed event</text>
    <text class="field" x="840" y="375">event_type schedule/todo</text>
    <text class="field" x="840" y="398">priority / status / recurrence_rule</text>
    <text class="field" x="840" y="421">source_input_id / deleted_at</text>
  </g>

  <g id="transactions">
    <rect class="box-finance" x="820" y="468" width="370" height="232" rx="12"/>
    <path class="header-finance" d="M832 468h346a12 12 0 0 1 12 12v34H820v-34a12 12 0 0 1 12-12z"/>
    <text class="box-title" x="840" y="492">transactions</text><text class="box-subtitle" x="990" y="492">交易流水</text>
    <text class="pk" x="840" y="530">PK</text><text class="field" x="870" y="530">id UUID</text>
    <text class="fk" x="840" y="553">FK</text><text class="field" x="870" y="553">user_id / event_id / category_id</text>
    <text class="field" x="840" y="576">type income/expense</text>
    <text class="field" x="840" y="599">amount NUMERIC(14,2) / currency</text>
    <text class="field" x="840" y="622">description / payment_method / location</text>
    <text class="field" x="840" y="645">occurred_at / is_manual</text>
    <text class="field" x="840" y="668">source_input_id / deleted_at</text>
    <text class="note" x="840" y="692">无 account_id，无 transfer</text>
  </g>

  <g id="event_reminders">
    <rect class="box-schedule" x="820" y="735" width="370" height="130" rx="12"/>
    <path class="header-schedule" d="M832 735h346a12 12 0 0 1 12 12v34H820v-34a12 12 0 0 1 12-12z"/>
    <text class="box-title" x="840" y="759">event_reminders</text><text class="box-subtitle" x="1015" y="759">单用户日程提醒</text>
    <text class="pk" x="840" y="797">PK</text><text class="field" x="870" y="797">id UUID</text>
    <text class="fk" x="840" y="820">FK</text><text class="field" x="870" y="820">user_id / event_id</text>
    <text class="field" x="840" y="843">remind_at / method / is_sent</text>
  </g>

  <g id="tag_bridges">
    <rect class="box-tag" x="820" y="900" width="370" height="145" rx="12"/>
    <path class="header-tag" d="M832 900h346a12 12 0 0 1 12 12v34H820v-34a12 12 0 0 1 12-12z"/>
    <text class="box-title" x="840" y="924">event_tags / transaction_tags</text><text class="box-subtitle" x="1060" y="924">标签桥接</text>
    <text class="fk" x="840" y="962">FK</text><text class="field" x="870" y="962">user_id UUID</text>
    <text class="field" x="840" y="985">event_id + tag_id</text>
    <text class="field" x="840" y="1008">transaction_id + tag_id</text>
    <text class="field" x="840" y="1031">用于日程和交易的多对多标签</text>
  </g>

  <!-- right column -->
  <g id="notification_settings">
    <rect class="box-user" x="1288" y="175" width="355" height="145" rx="12"/>
    <path class="header-user" d="M1300 175h331a12 12 0 0 1 12 12v34h-355v-34a12 12 0 0 1 12-12z"/>
    <text class="box-title" x="1308" y="199">notification_settings</text><text class="box-subtitle" x="1505" y="199">通知设置</text>
