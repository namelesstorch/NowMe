    <text class="field" x="1308" y="463">target_amount / current_amount / status</text>
  </g>

  <g id="budgets">
    <rect class="box-cache" x="1288" y="535" width="355" height="145" rx="12"/>
    <path class="header-cache" d="M1300 535h331a12 12 0 0 1 12 12v34h-355v-34a12 12 0 0 1 12-12z"/>
    <text class="box-title" x="1308" y="559">budgets</text><text class="box-subtitle" x="1425" y="559">预算</text>
    <text class="pk" x="1308" y="597">PK</text><text class="field" x="1338" y="597">id UUID</text>
    <text class="fk" x="1308" y="620">FK</text><text class="field" x="1338" y="620">user_id / category_id</text>
    <text class="field" x="1308" y="643">period / start_date / end_date</text>
    <text class="field" x="1308" y="666">limit_amount / alert_threshold</text>
  </g>

  <g id="spending_summaries">
    <rect class="box-cache" x="1288" y="715" width="355" height="165" rx="12"/>
    <path class="header-cache" d="M1300 715h331a12 12 0 0 1 12 12v34h-355v-34a12 12 0 0 1 12-12z"/>
    <text class="box-title" x="1308" y="739">spending_summaries</text><text class="box-subtitle" x="1500" y="739">统计缓存</text>
    <text class="pk" x="1308" y="777">PK</text><text class="field" x="1338" y="777">id UUID</text>
    <text class="fk" x="1308" y="800">FK</text><text class="field" x="1338" y="800">user_id UUID</text>
    <text class="field" x="1308" y="823">period_type / period_start / period_end</text>
    <text class="field" x="1308" y="846">total_income / total_expense / balance</text>
    <text class="field" x="1308" y="869">category_breakdown JSONB</text>
  </g>

  <g id="ai_insights">
