    <text class="fk" x="1308" y="260">FK</text><text class="field" x="1338" y="260">user_id UUID</text>
    <text class="field" x="1308" y="283">channel / quiet_start / quiet_end / enabled</text>
  </g>

  <g id="financial_goals">
    <rect class="box-cache" x="1288" y="355" width="355" height="145" rx="12"/>
    <path class="header-cache" d="M1300 355h331a12 12 0 0 1 12 12v34h-355v-34a12 12 0 0 1 12-12z"/>
