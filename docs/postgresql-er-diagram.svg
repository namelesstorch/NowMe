    <text class="pk" x="1308" y="977">PK</text><text class="field" x="1338" y="977">id UUID</text>
    <text class="fk" x="1308" y="1000">FK</text><text class="field" x="1338" y="1000">user_id UUID</text>
    <text class="field" x="1308" y="1023">insight_type / title / content / related_data</text>
  </g>

  <g id="ai_recommendation_feedback">
